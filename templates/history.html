<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physio | History</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #7C3AED;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --bg: #0F172A;
            --card: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            color: #F8FAFC;
            min-height: 100vh;
        }

        .glass-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(124, 58, 237, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        nav {
            width: 280px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(to right, #A78BFA, #34D399);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 3rem;
            text-decoration: none;
        }

        .nav-item {
            padding: 1rem;
            color: #94A3B8;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 1rem;
            border-radius: 12px;
            transition: 0.3s;
            margin-bottom: 0.5rem;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .nav-item.active {
            background: var(--accent);
            color: white;
        }

        main {
            flex: 1;
            padding: 3rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .history-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem 2rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            transition: 0.3s;
        }

        .history-card:hover {
            border-color: var(--accent);
            transform: scale(1.01);
        }

        .date-box {
            min-width: 120px;
        }

        .date-box .time {
            font-size: 0.8rem;
            color: #64748B;
        }

        .assessment-name {
            flex: 1;
        }

        .assessment-name h3 {
            font-size: 1.2rem;
            color: #E2E8F0;
        }

        .score-display {
            display: flex;
            gap: 3rem;
            text-align: center;
        }

        .score-val {
            font-weight: 800;
            font-size: 1.5rem;
            display: block;
        }

        .score-label {
            font-size: 0.7rem;
            color: #64748B;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .improvement-badge {
            padding: 0.4rem 0.8rem;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .pos {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .neg {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .empty-state {
            text-align: center;
            padding: 5rem;
            background: var(--card);
            border-radius: 30px;
            border: 1px dashed var(--border);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3);
        }
    </style>
</head>

<body>
    <div class="glass-bg"></div>
    <div class="container">
        <nav>
            <a href="/dashboard" class="logo">Physio</a>
            <a href="/dashboard" class="nav-item"><i class="fa-solid fa-gauge-high"></i> Assessment</a>
            <a href="/history" class="nav-item active"><i class="fa-solid fa-chart-line"></i> History</a>
            <a href="/dashboard" class="nav-item"><i class="fa-solid fa-robot"></i> AI Chatbot</a>
        </nav>

        <main>
            <header>
                <div>
                    <h1 style="font-size: 2.5rem; font-weight: 800;">Assessment History</h1>
                    <p style="color: #64748B;">Tracking your biomechanical progress over time</p>
                </div>
                <a href="/assessment" class="btn-primary"><i class="fa-solid fa-plus"></i> New Assessment</a>
            </header>

            <div id="history-list">
                <!-- Loading State -->
                <div style="text-align: center; padding: 3rem;">
                    <i class="fa-solid fa-circle-notch fa-spin fa-2xl" style="color: var(--accent);"></i>
                </div>
            </div>
        </main>
    </div>

    <script>
        async function loadHistory() {
            try {
                const res = await fetch('/api/history');
                const data = await res.json();
                const list = document.getElementById('history-list');

                if (!data || data.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <i class="fa-solid fa-folder-open fa-3xl" style="color: #1E293B; margin-bottom: 2rem; display: block;"></i>
                            <h2>No records found</h2>
                            <p style="color: #64748B; margin-bottom: 2rem;">Complete your first assessment to start tracking progress.</p>
                            <a href="/assessment" class="btn-primary">Start Now</a>
                        </div>
                    `;
                    return;
                }

                list.innerHTML = data.map(record => {
                    const dateObj = new Date(record.created_at);
                    const dateStr = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                    const timeStr = dateObj.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                    const imp = record.improvement || 0;
                    const impClass = imp >= 0 ? 'pos' : 'neg';
                    const impChar = imp >= 0 ? '+' : '';

                    return `
                        <div class="history-card">
                            <div class="date-box">
                                <div style="font-weight: 700;">${dateStr}</div>
                                <div class="time">${timeStr}</div>
                            </div>
                            <div class="assessment-name">
                                <h3>${record.assessment_type}</h3>
                                <p style="font-size: 0.8rem; color: #64748B;">Posterior Oblique Sling Analysis</p>
                            </div>
                            <div class="score-display">
                                <div>
                                    <span class="score-label">Initial</span>
                                    <span class="score-val">${record.test1_score}%</span>
                                </div>
                                <div>
                                    <span class="score-label">Final</span>
                                    <span class="score-val" style="color: #A78BFA;">${record.test2_score}%</span>
                                </div>
                            </div>
                            <div class="improvement-badge ${impClass}">
                                ${impChar}${imp}% Improvement
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (e) {
                document.getElementById('history-list').innerHTML = `<p style="color: var(--danger);">Failed to load history. Please try again.</p>`;
            }
        }

        loadHistory();
    </script>
</body>

</html>
